name: ci

# This workflow is triggered on pushes and pull requests to the main branch
on:
  push:
    # branches:
    #   - main
    paths:
      - "fragments/**"
  pull_request:
    # branches:
    #   - main
    paths:
      - "fragments/**"

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set-up node
        uses: actions/setup-node@v4
        with:
          # Use node LTS
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        working-directory: fragments
        run: npm ci

      - name: Run ESLint
        working-directory: fragments
        run: npm run lint
