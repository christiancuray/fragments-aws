<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fragments UI</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="src/app.js"></script>
  </head>
  <body>
    <h1>Fragments UI</h1>
    <section>
      <nav>
        <button id="login">Login</button>
      </nav>
    </section>
    <section hidden id="user">
      <h2>Hello <span class="username"></span>!</h2>

      <!-- Fragment Creation Form -->
      <div id="fragment-form">
        <h3>Create New Fragment</h3>
        <form id="create-fragment-form">
          <div>
            <label for="fragment-content">Content:</label>
            <textarea
              id="fragment-content"
              rows="4"
              cols="50"
              placeholder="Enter your text fragment here..."
              required
            ></textarea>
          </div>
          <div class="fragment-content-type">
            <label for="content-type">Content Type:</label>
            <select id="content-type">
              <option value="text/plain">text/plain</option>
              <option value="application/json">application/json</option>
            </select>
          </div>
          <button type="submit">Create Fragment</button>
        </form>

        <!-- Fragment Creation Result -->
        <div id="fragment-result" style="display: none">
          <h4>Fragment Created Successfully!</h4>
        </div>
      </div>

      <!-- Navigation -->
      <div id="navigation">
        <button id="view-fragments-btn">View My Fragments</button>
      </div>

      <!-- User Fragments List (hidden by default) -->
      <div id="fragments-list" style="display: none">
        <h3>Your Fragments</h3>
        <button id="back-to-form-btn">Back to Create Fragment</button>
        <div id="fragments-container"></div>
      </div>
    </section>
  </body>
</html>
